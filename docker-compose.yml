services:
  mfp-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mfp-mcp
    restart: unless-stopped
    environment:
      # MyFitnessPal credentials (optional if using persistent session via VNC)
      - MFP_USERNAME=${MFP_USERNAME}
      - MFP_PASSWORD=${MFP_PASSWORD}
      
      # MCP Settings
      - MFP_HOST=0.0.0.0
      - MFP_PORT=8000
      - MFP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      
      # VNC Display
      - DISPLAY=:99
      
      # MFP sync schedule (cron expression); empty = no periodic sync
      - MFP_SYNC_SCHEDULE=${MFP_SYNC_SCHEDULE:-0 6,14,22 * * *}
      # Number of days to sync each run
      - MFP_SYNC_DAYS=${MFP_SYNC_DAYS:-30}
    ports:
      - "8000:8000"
      - "5900:5900"
    volumes:
      # Persistent cookies (legacy)
      - mfp_cookies:/home/mcp/.mfp_mcp
      # NEW: Persistent Browser Profile (Camoufox/Firefox session)
      - mfp_browser_profile:/home/mcp/.mfp_mcp/browser_profile
      # NEW: SQLite cache persists across restarts
      - mfp_cache:/home/mcp/.mfp_mcp
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mfp-mcp.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mfp-mcp.entrypoints=websecure"
      - "traefik.http.routers.mfp-mcp.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.mfp-mcp.loadbalancer.server.port=8000"
    networks:
      - mfp_network
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 1m
      timeout: 10s
      retries: 3
    # Cap resources to prevent memory leaks in Playwright/Firefox
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  mfp_cookies:
  mfp_browser_profile:
  mfp_cache:

networks:
  mfp_network:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
